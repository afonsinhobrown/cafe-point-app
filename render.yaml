services:
  - type: web
    name: cafepoint-monolith
    runtime: docker
    plan: free
    region: frankfurt
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: cafepoint-db
          property: connectionString

databases:
  - name: cafepoint-db
    plan: free
    region: frankfurt
    databaseName: cafepoint
    user: admin
